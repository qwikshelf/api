version: '3.8'

services:
  # --- Beta Database ---
  db-beta:
    image: postgis/postgis:15-3.4-alpine
    container_name: beta-qwikshelf-db
    restart: always
    env_file:
      - .env.beta
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - qwikshelf-api_qwikshelf-network
    volumes:
      - postgres_data_beta:/var/lib/postgresql/data

  # --- Beta Backend API ---
  api-beta:
    build:
      context: ../..
      dockerfile: deploy/api.Dockerfile
    container_name: beta-qwikshelf-api
    restart: always
    depends_on:
      - db-beta
    env_file:
      - .env.beta
    environment:
      - DB_HOST=db-beta
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    networks:
      - qwikshelf-api_qwikshelf-network

  # --- Beta Frontend UI ---
  ui-beta:
    build:
      context: ../../../ui
      dockerfile: ../deploy/ui.Dockerfile
    container_name: beta-qwikshelf-ui
    restart: always
    depends_on:
      - api-beta
    networks:
      - qwikshelf-api_qwikshelf-network

networks:
  qwikshelf-api_qwikshelf-network:
    external: true

volumes:
  postgres_data_beta:
