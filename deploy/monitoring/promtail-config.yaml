server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: qwikshelf-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: qwikshelf-api
          __path__: /var/log/qwikshelf/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: message
            time: time
            method: method
            path: path
            status: status
            request_id: request_id
            user_id: userID
      - labels:
          level:
          method:
          path:
          status:
          request_id:
          user_id:
      - timestamp:
          source: time
          format: RFC3339
      - output:
          source: msg
