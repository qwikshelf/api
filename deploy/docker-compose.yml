version: '3.8'

services:
  # --- Reverse Proxy & SSL ---
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: qwikshelf-proxy
    restart: always
    ports:
      - '80:80' # HTTP
      - '81:81' # Admin UI
      - '443:443' # HTTPS
    volumes:
      - ./proxy/data:/data
      - ./proxy/letsencrypt:/etc/letsencrypt
    networks:
      - frontend-edge

  # --- Database ---
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: qwikshelf-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Port 5432 is exposed for local development access
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-secure
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Backend API ---
  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    container_name: qwikshelf-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL_MODE=${DB_SSL_MODE}
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    # Persistence for logs
    volumes:
      - ../logs:/root/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend-edge
      - backend-secure

  # --- Adminer (DB Management) ---
  adminer:
    image: adminer
    container_name: qwikshelf-adminer
    restart: always
    networks:
      - frontend-edge
      - backend-secure
    environment:
      ADMINER_DEFAULT_SERVER: db

  # --- Frontend UI ---
  ui:
    build:
      context: ../ui
      dockerfile: ../deploy/ui.Dockerfile
      args:
        - VITE_API_BASE_URL=https://api.qwikshelf.store
    container_name: qwikshelf-ui
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend-edge

  # --- Monitoring Stack ---
  loki:
    image: grafana/loki:2.9.0
    container_name: qwikshelf-loki
    restart: always
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - frontend-edge
      - backend-secure
    deploy:
      resources:
        limits:
          memory: 250M

  promtail:
    image: grafana/promtail:2.9.0
    container_name: qwikshelf-promtail
    restart: always
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml
      - ../logs:/var/log/qwikshelf
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend-secure
    deploy:
      resources:
        limits:
          memory: 100M

  grafana:
    image: grafana/grafana:10.1.0
    container_name: qwikshelf-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_DOMAIN=logs.qwikshelf.store
      - GF_SERVER_ROOT_URL=https://logs.qwikshelf.store
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning
    networks:
      - frontend-edge
      - backend-secure
    deploy:
      resources:
        limits:
          memory: 300M

networks:
  frontend-edge:
    driver: bridge
  backend-secure:
    internal: true
    driver: bridge

volumes:
  postgres_data:
  loki_data:
  grafana_data:
